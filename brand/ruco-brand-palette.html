document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ercase; color: #2F80ED; margin-bottom: 14px;\">Brand colour palette<\u002Fdiv>\n      <h1 style=\"font-size: 44px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.08; max-width: 620px; text-wrap: balance;\">One signal yellow, a working blue, white, and two greys.<\u002Fh1>\n      <p style=\"font-size: 16px; line-height: 1.6; color: #6A7280; max-width: 560px; margin-top: 16px;\">A restrained system pulled straight from the editor theme. Yellow marks what matters, blue is reserved for anything clickable, and the greys + white carry everything else. Click any swatch to copy its hex.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- CORE FIVE -->\n    <section style=\"margin-bottom: 64px;\">\n      <div style=\"display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px;\">\n\n        <div data-hex=\"#E8B923\" onclick=\"{{ handleCopy }}\" style=\"cursor: pointer; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 3px rgba(16,24,40,0.08); background: #E8B923; color: #1E2228; min-height: 250px; display: flex; flex-direction: column; justify-content: space-between; padding: 22px;\" style-hover=\"box-shadow: 0 10px 28px rgba(16,24,40,0.16); transform: translateY(-3px);\">\n          <div style=\"font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.66;\">Primary · Signal<\u002Fdiv>\n          <div>\n            <div style=\"font-size: 20px; font-weight: 800; letter-spacing: -0.01em;\">Ruco Yellow<\u002Fdiv>\n            <div style=\"font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 14px; font-weight: 700; margin-top: 6px;\">#E8B923<\u002Fdiv>\n            <div style=\"font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 11px; opacity: 0.62; margin-top: 2px;\">rgb(232 185 35)<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div data-hex=\"#2F80ED\" onclick=\"{{ handleCopy }}\" style=\"cursor: pointer; border-radius: 16px; overflow: hidden; box-shadow: 0 1px 3px rgba(16,24,40,0 ; font-weight: 700; color: #C7CBD2;\"><span>#1E2228<\u002Fspan><span style=\"font-size: 9px; opacity: 0.7;\">GRAPHITE<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- IN CONTEXT + ROLES -->\n    <section style=\"display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; align-items: stretch;\">\n\n      <!-- Mock -->\n      <div style=\"border-radius: 16px; overflow: hidden; box-shadow: 0 12px 40px rgba(16,24,40,0.14); background: #1E2228;\">\n        <div style=\"display: flex; align-items: center; gap: 7px; padding: 13px 16px; background: #16191E; border-bottom: 1px solid #2B2F35;\">\n          <div style=\"width: 11px; height: 11px; border-radius: 50%; background: #3A4049;\"><\u002Fdiv>\n          <div style=\"width: 11px; height: 11px; border-radius: 50%; background: #3A4049;\"><\u002Fdiv>\n          <div style=\"width: 11px; height: 11px; border-radius: 50%; background: #3A4049;\"><\u002Fdiv>\n          <div style=\"margin-left: 12px; font-family: ui-monospace, monospace; font-size: 11px; color: #6A7280;\">ruco.dev<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 48px 44px 52px;\">\n          <div style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #E8B923; margin-bottom: 18px;\">RUCO.DEV<\u002Fdiv>\n          <h3 style=\"font-size: 34px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.1; color: #FFFFFF; max-width: 460px;\">One signal colour. Everything else gets out of the way.<\u002Fh3>\n          <p style=\"font-size: 15px; line-height: 1.65; color: #9AA1AC; max-width: 420px; margin-top: 18px;\">Yellow for what matters. Blue for what's clickable. Grey and white carry the rest, so the eye always knows where to land.<\u002Fp>\n          <div style=\"display: flex; align-items: center; gap: 24px; margin-top: 30px;\">\n            <button style=\"background: #E8B923; color: #1E2228; border: none; border-radius: 9px; padding: 14px 26px; font-s gn-items: flex-start;\">\n            <div style=\"width: 14px; height: 14px; border-radius: 4px; background: #2F80ED; margin-top: 2px; flex-shrink: 0;\"><\u002Fdiv>\n            <div><div style=\"font-size: 13px; font-weight: 700;\">Blue · clickable only<\u002Fdiv><div style=\"font-size: 12.5px; color: #6A7280; line-height: 1.5;\">Links and inline actions. Never decorative.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 13px; align-items: flex-start;\">\n            <div style=\"width: 14px; height: 14px; border-radius: 4px; background: #E8B923; margin-top: 2px; flex-shrink: 0;\"><\u002Fdiv>\n            <div><div style=\"font-size: 13px; font-weight: 700;\">Yellow · 10% signal<\u002Fdiv><div style=\"font-size: 12.5px; color: #6A7280; line-height: 1.5;\">The one CTA, the active state, the thing to notice. Use dark text on it.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: auto; padding-top: 20px; border-top: 1px solid #F2F3F5;\">\n          <div style=\"font-size: 11px; color: #9AA1AC; line-height: 1.55;\"><strong style=\"color: #6A7280;\">Contrast note:<\u002Fstrong> yellow is light — pair it with Graphite text, never white. Blue passes AA on white for links.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ copied }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%); background: #1E2228; color: #FFFFFF; padding: 11px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: 'Segoe UI', system-ui, sans-serif; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: toastIn 0.18s ease-out; z-index: 100; display: flex; align-items: center; gap: 9px;\">\n      <span style=\"width: 13px; height: 13px; border-radius: 3px; background: {{ copied }}; display: inline-block; border: 1px solid rgba(255,255,255,0.25);\"><\u002Fspan>\n      <span style=\"font-family: ui-monospace, monospace;\">{{ copied }}<\u002Fspan> copied\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { copied: null };\n  renderVals() {\n    return {\n      copied: this.state.copied,\n      handleCopy: (e) => {\n        const hex = e.currentTarget.getAttribute('data-hex');\n        if (!hex) return;\n        try {\n          navigator.clipboard && navigator.clipboard.writeText(hex);\n        } catch (err) {}\n        clearTimeout(this._t);\n        this.setState({ copied: hex });\n        this._t = setTimeout(() => this.setState({ copied: null }), 1400);\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
